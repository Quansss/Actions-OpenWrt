name: Build CR6606 sharkos

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TZ: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev python3

      - name: 拉取 ImmortalWrt 源码
        run: |
          git clone https://github.com/immortalwrt/immortalwrt --depth=1 openwrt

      - name: 添加 SSR+ & PassWall2 插件
        run: |
          cd openwrt
          git clone https://github.com/fw876/helloworld package/helloworld
          git clone https://github.com/xiaorouji/openwrt-passwall2 package/passwall2

      - name: 更新 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 生成 CR6606 配置
        run: |
          cd openwrt
          cat > .config << EOF
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt7621=y
          CONFIG_TARGET_ramips_mt7621_DEVICE_xiaomi_mi-router-cr6606=y
          CONFIG_PACKAGE_luci-app-ssr-plus=y
          CONFIG_PACKAGE_luci-app-passwall2=y
          CONFIG_PACKAGE_luci-app-frpc=y
          EOF
          make defconfig

      - name: 下载软件包
        run: |
          cd openwrt
          make download -j8

      - name: 开始编译固件
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: cr6606-firmware
          path: openwrt/bin/targets/ramips/mt7621/*

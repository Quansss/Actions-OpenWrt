name: Build CR6606
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TZ: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install
        run: sudo apt update && sudo apt install build-essential libncurses-dev bison flex libssl-dev python3 -y

      - name: Clone
        run: git clone https://gitee.com/immortalwrt/immortalwrt.git --depth=1 openwrt

      - name: Plugins
        run: |
          cd openwrt/package
          git clone https://gitee.com/kooljun/helloworld.git
          git clone https://gitee.com/kooljun/passwall2.git

      - name: Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Config
        run: |
          cd openwrt
          echo "CONFIG_TARGET_ramips=y" > .config
          echo "CONFIG_TARGET_ramips_mt7621=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7621_DEVICE_xiaomi_mi-router-cr6606=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ssr-plus=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-passwall2=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-frpc=y" >> .config
          make defconfig

      - name: Download
        run: cd openwrt && make download -j8

      - name: Compile
        run: cd openwrt && make -j$(nproc) || make -j1 V=s

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: cr6606-firmware
          path: openwrt/bin/targets/ramips/mt7621/*
